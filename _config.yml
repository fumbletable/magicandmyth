title: "Magic&Myth"
description: "The complete digital companion for Magic&Myth — ancestries, classes, equipment, spells, and more."
url: "https://fumbletable.github.io"
baseurl: "/magicandmyth"

# Theme
remote_theme: just-the-docs/just-the-docs

# Colour scheme
color_scheme: light

# Logo (placeholder until Scott provides one)
# logo: "/assets/images/logo.png"

# Aux links (top right)
aux_links:
  "GitHub":
    - "https://github.com/fumbletable/magicandmyth"

aux_links_new_tab: true

# Footer
footer_content: "Magic&Myth is &copy; Scott Myers. Built with <a href=\"https://just-the-docs.com\">Just the Docs</a>."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Build settings
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-remote-theme
  - jekyll-include-cache
